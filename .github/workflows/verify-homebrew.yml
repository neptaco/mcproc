name: Verify Homebrew Formula

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      wait_seconds:
        description: 'Seconds to wait before verification (for tap propagation)'
        required: false
        type: number
        default: 60

jobs:
  verify:
    name: Verify Homebrew Formula (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Wait for tap update
        if: ${{ inputs.wait_seconds > 0 }}
        run: sleep ${{ inputs.wait_seconds }}

      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Update Homebrew
        run: brew update

      - name: Tap neptaco/tap
        run: brew tap neptaco/tap

      - name: Fetch and verify checksum
        run: brew fetch --force neptaco/tap/mcproc

      - name: Test install
        run: brew install neptaco/tap/mcproc

      - name: Verify binary
        run: mcproc --help
